<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>I turned 20 today — Premium Personal Workspace & Life Tracker</title>
    <meta name="description" content="An aesthetic, high-productivity workspace combining study tracks, goal planners, finances, fitness habits, and screen time metrics, framed around a ticking year countdown and Git contribution graph." />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Driver.js for Guided Tour -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css"/>
    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js"></script>

  </head>
  <body class="obsidian-theme">
    <div id="app" class="app-layout">
      <!-- Sidebar Navigation -->
      <aside class="sidebar glass-panel" id="main-sidebar" style="display: none;">
        <div class="sidebar-brand">
          <span class="brand-glow"></span>
          <div class="logo-box">
            <img src="/assets/iturned20today-logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;" />
          </div>
          <div class="brand-text">
            <h1>I turned 20 today</h1>
            <span class="sub-logo font-accent">Life Repository</span>
          </div>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-item active" id="nav-dashboard" data-view="dashboard">
            <i data-lucide="layout-dashboard"></i>
            <span>Dashboard</span>
          </button>
          <button class="nav-item" id="nav-degree" data-view="degree">
            <i data-lucide="graduation-cap"></i>
            <span>Syllabus Track</span>
          </button>
          <button class="nav-item" id="nav-calendar" data-view="calendar">
            <i data-lucide="calendar"></i>
            <span>Study Planner</span>
          </button>
          <button class="nav-item" id="nav-goals" data-view="goals">
            <i data-lucide="target"></i>
            <span>Life Goals</span>
          </button>
          <button class="nav-item" id="nav-finances" data-view="finances">
            <i data-lucide="wallet"></i>
            <span>Finances</span>
          </button>
          <button class="nav-item" id="nav-fitness" data-view="fitness">
            <i data-lucide="activity"></i>
            <span>Fitness & Habits</span>
          </button>
          <button class="nav-item" id="nav-pomodoro" data-view="pomodoro">
            <i data-lucide="timer"></i>
            <span>Focus Mode</span>
          </button>
          <button class="nav-item" id="nav-journal" data-view="journal">
            <i data-lucide="book-open"></i>
            <span>Daily Log</span>
          </button>
        </nav>

        <!-- Sidebar Footer & Settings -->
        <div class="sidebar-footer" style="padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 8px;">
          <button class="nav-item" id="btn-open-settings" style="width: 100%; justify-content: flex-start; padding: 10px 16px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);">
            <i data-lucide="user" style="width: 18px; height: 18px; color: var(--text-secondary);"></i>
            <span style="margin-left: 12px; font-weight: 500; font-size: 0.95rem;">Account</span>
          </button>
          
          <button class="btn btn-primary" id="btn-upgrade-pro" title="Upgrade to Pro" style="width: 100%; padding: 8px 12px; font-size: 0.85rem; border-radius: 12px;">
            <span style="margin-right: 4px; font-size: 1rem;">🚀</span>
            <span style="font-weight: 700;">Upgrade</span>
          </button>
        </div>
      </aside>

      <!-- Main Content Area -->
      <main class="main-content" id="main-view-container">
        <!-- Rendered component templates get injected here -->
      </main>
    </div>

    <!-- Onboarding portal — the wizard renders here over the full screen -->
    <div id="onboarding-portal"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
